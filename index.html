<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PROVO — Non-Nicotine Pouches</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Jost:ital,wght@0,200;0,300;0,400;0,500;1,300&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>

    <!-- Loading screen -->
    <div id="loader">
      <div class="loader-inner">
        <div class="loader-logo">PROVO</div>
        <div class="loader-track">
          <div class="loader-bar" id="loader-bar"></div>
        </div>
        <div class="loader-pct" id="loader-pct">0%</div>
      </div>
    </div>

    <!-- Fixed nav -->
    <nav id="nav">
      <div class="nav-logo">PROVO</div>
      <button class="nav-cta">Get Notified</button>
    </nav>

    <!-- Scroll-jacked hero container -->
    <div id="scroll-container">
      <section id="hero">
        <img id="frame-img" src="/frames/ezgif-frame-001.jpg" alt="PROVO Pouch" />

        <!-- Intro overlay text -->
        <div id="hero-text">
          <h1 class="hero-title">PROVO</h1>
          <p class="hero-sub">Non-nicotine pouches.&nbsp;&nbsp;Pure flavor.</p>
          <div class="scroll-hint">
            <span>Scroll</span>
            <div class="scroll-line"></div>
          </div>
        </div>
      </section>
    </div>

    <!-- Depth gallery — inline section directly under the hero -->
    <section id="gallery-section">
      <canvas class="webgl"></canvas>
    </section>

    <!-- Coming soon -->
    <section id="coming-soon">
      <div class="cs-inner">
        <span class="cs-eyebrow">Coming Soon</span>
        <h2 class="cs-headline">A new kind<br />of pouch.</h2>
        <p class="cs-body">
          No nicotine. No compromise. Just clean, lasting flavor whenever you want it.
        </p>
        <button class="cs-cta">Join the Waitlist</button>
      </div>
    </section>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
